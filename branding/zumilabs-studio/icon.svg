<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="zl-icon-title zl-icon-desc">
  <title id="zl-icon-title">ZumiLabs Studio</title>
  <desc id="zl-icon-desc">A laboratory flask containing a play triangle, rendered in a violet-to-pink-to-amber gradient.</desc>
  <defs>
    <linearGradient id="zl-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="55%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Flask body + neck + cap as one shape, with play-triangle cutout (evenodd) -->
  <path fill="url(#zl-grad)" fill-rule="evenodd" d="
    M 96 26
    h 64
    a 8 8 0 0 1 8 8
    v 8
    a 8 8 0 0 1 -8 8
    h -4
    v 44
    l 52 90
    a 28 28 0 0 1 -24 42
    H 72
    a 28 28 0 0 1 -24 -42
    l 52 -90
    V 50
    h -4
    a 8 8 0 0 1 -8 -8
    v -8
    a 8 8 0 0 1 8 -8
    Z
    M 108 168
    L 156 196
    L 108 224
    Z
  "/>
  <!-- Bubbles -->
  <circle cx="172" cy="178" r="6" fill="url(#zl-grad)" opacity="0.85"/>
  <circle cx="84"  cy="200" r="4" fill="url(#zl-grad)" opacity="0.7"/>
</svg>
