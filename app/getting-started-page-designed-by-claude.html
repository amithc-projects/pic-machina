<style>
  :root{
    --bg:#0a0f1c;
    --bg-2:#0f1626;
    --panel:#141c2e;
    --panel-2:#182236;
    --line:rgba(255,255,255,0.07);
    --line-2:rgba(255,255,255,0.12);
    --text:#e7ecf5;
    --text-dim:#98a3b8;
    --text-mute:#6a7590;
    --primary:#3b82f6;
    --primary-2:#60a5fa;
    --teal:#2dd4bf;
    --orange:#fb923c;
    --pink:#f472b6;
    --amber:#fbbf24;
    --violet:#a78bfa;
    --cyan:#22d3ee;
    --green:#34d399;
    --red:#f87171;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  .mono{font-family:'JetBrains Mono',monospace}
  .serif{font-family:'Instrument Serif',serif;font-weight:400}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  ::selection{background:rgba(59,130,246,0.35)}
  /* Subtle grid backdrop */
  .gridbg{
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
  }
  /* Animated dashed line in pipeline */
  @keyframes march { to { stroke-dashoffset: -24; } }
  .march { stroke-dasharray: 6 6; animation: march 1.2s linear infinite; }
  @keyframes pulseDot { 0%,100%{opacity:.4} 50%{opacity:1} }
  .pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .float-slow { animation: float 3.2s ease-in-out infinite; }
  @keyframes shimmer {
    0%{background-position:-200% 0}
    100%{background-position:200% 0}
  }
  .shimmer{
    background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 100%);
    background-size: 200% 100%;
    animation: shimmer 2.4s linear infinite;
  }
  @keyframes caret { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .caret{ animation: caret 1s step-end infinite; }
  /* tour progress bar grow */
  @keyframes fillbar { from{width:0} to{width:var(--target,100%)} }
  .scroll-hide::-webkit-scrollbar{display:none}
  .scroll-hide{scrollbar-width:none}
  /* Hover lift */
  .lift{transition:transform .2s ease, border-color .2s ease, background .2s ease}
  .lift:hover{transform:translateY(-2px)}
  /* Tweaks panel */
  .tweaks{
    position:fixed; right:20px; bottom:20px; z-index:80;
    background:rgba(20,28,46,0.92); backdrop-filter: blur(12px);
    border:1px solid var(--line-2); border-radius:14px; padding:14px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02) inset;
    min-width:260px;
  }
</style>
</head>

/* ===================== SIDEBAR ===================== */
function Sidebar({active="started"}){
  const items = [
    {id:"started", label:"Get Started", icon:I.rocket, active:true},
    {id:"showcase", label:"Showcase", icon:I.star},
    {group:true},
    {id:"library", label:"Library", icon:I.library},
    {id:"blocks", label:"Block Builder", icon:I.blocks},

    {id:"history", label:"History", icon:I.history},
    {id:"folder", label:"Folder", icon:I.folder},
    {group:true},
    {id:"models", label:"Models", icon:I.models},
    {id:"sync", label:"Config Sync", icon:I.sync},
    {id:"help", label:"Help", icon:I.help},
    {id:"settings", label:"Settings", icon:I.settings},
  ];
  return (
    <aside style={{
      width:220, flex:"0 0 220px", background:"#0b1322",
      borderRight:"1px solid var(--line)", padding:"18px 14px",
      display:"flex", flexDirection:"column", gap:4, height:"100vh", position:"sticky", top:0
    }}>
      <div style={{display:"flex", alignItems:"center", gap:10, padding:"4px 6px 16px", borderBottom:"1px solid var(--line)", marginBottom:10}}>
        <div style={{width:28, height:28, borderRadius:8, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"grid", placeItems:"center", boxShadow:"0 0 0 1px rgba(255,255,255,0.08) inset"}}>
          <Icon size={15} d={<><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.2 4.2l4.3 4.3M15.5 15.5l4.3 4.3M1 12h6M17 12h6M4.2 19.8l4.3-4.3M15.5 8.5l4.3-4.3"/></>}/>
        </div>
        <div style={{fontWeight:700, letterSpacing:.2}}>PicMachina</div>
      </div>
      {items.map((it,idx)=>{
        if(it.group) return <div key={"g"+idx} style={{height:1, background:"var(--line)", margin:"10px 2px"}}/>;
        const isActive = it.id===active;
        return (
          <div key={it.id} style={{
            display:"flex", alignItems:"center", gap:10, padding:"8px 10px", borderRadius:8,
            color: isActive? "#93c5fd":"var(--text-dim)",
            background: isActive? "rgba(59,130,246,0.12)":"transparent",
            border: isActive? "1px solid rgba(59,130,246,0.25)":"1px solid transparent",
            fontSize:13, fontWeight: isActive?600:500, cursor:"pointer"
          }}>
            <span style={{display:"inline-flex"}}>{it.icon}</span>
            {it.label}
          </div>
        );
      })}
      <div style={{flex:1}}/>
      <div style={{display:"flex", justifyContent:"center", padding:"10px 0"}}>

      </div>
    </aside>
  );
}

/* ===================== SHARED: header row on content ===================== */

/* ===================== HERO A — LIVE PIPELINE ===================== */
function LivePipelineHero(){
  // animated processing state on a loop
  const [tick,setTick] = React.useState(0);
  React.useEffect(()=>{
    const id = setInterval(()=>setTick(t=>(t+1)%400), 50);
    return ()=>clearInterval(id);
  },[]);
  const phase = Math.floor(tick/100); // 0..3
  const nodes = [
    {label:"Input", sub:"portrait_04.jpg", x:40,  y:90, color:"var(--teal)", icon:I.image, kind:"source"},
    {label:"Analyse", sub:"detect faces",  x:230, y:40, color:"var(--cyan)", icon:I.scan},
    {label:"Amend",   sub:"cinematic LUT", x:230, y:140,color:"var(--orange)", icon:I.slider},
    {label:"Annotate",sub:"add caption",   x:420, y:40, color:"var(--amber)", icon:I.type},
    {label:"Output",  sub:"/exports/final/",x:420, y:140,color:"var(--green)", icon:I.download},
  ];
  // progress for each edge: fill based on phase
  const edges = [
    {from:0, to:1, active:phase>=0},
    {from:0, to:2, active:phase>=0},
    {from:1, to:3, active:phase>=1},
    {from:2, to:3, active:phase>=2},
    {from:2, to:4, active:phase>=2},
    {from:3, to:4, active:phase>=3},
  ];
  const getNode = i => nodes[i];
  const edgePath = (a,b) => {
    const x1=a.x+140, y1=a.y+30, x2=b.x, y2=b.y+30;
    const mx=(x1+x2)/2;
    return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
  };

  return (
    <div style={{
      position:"relative", borderRadius:20, overflow:"hidden",
      background:"linear-gradient(180deg, #0f1a30 0%, #0c1424 100%)",
      border:"1px solid var(--line-2)",
      padding:"40px 48px"
    }}>
      {/* backdrop glow */}
      <div style={{position:"absolute", inset:0, pointerEvents:"none",
        background:"radial-gradient(600px 300px at 20% 0%, rgba(59,130,246,0.18), transparent 60%), radial-gradient(500px 300px at 90% 100%, rgba(167,139,250,0.12), transparent 60%)"}}/>
      <div className="gridbg" style={{position:"absolute", inset:0, opacity:.5, maskImage:"radial-gradient(ellipse at center, black 30%, transparent 80%)"}}/>

      <div style={{position:"relative", display:"grid", gridTemplateColumns:"1.1fr 1.3fr", gap:48, alignItems:"center"}}>
        {/* LEFT: copy */}
        <div>
          <div style={{display:"inline-flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:999, background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)", marginBottom:20}}>
            <span className="pulse-dot" style={{width:6, height:6, borderRadius:3, background:"#60a5fa"}}/>
            <span className="mono" style={{fontSize:11, color:"#93c5fd", letterSpacing:1, textTransform:"uppercase"}}>Local · Private · Fast</span>
          </div>
          <h1 style={{margin:0, fontSize:56, lineHeight:1.02, letterSpacing:-1.2, fontWeight:700}}>
            Imagine the outcome. <span className="serif" style={{fontStyle:"italic", color:"#cbd5e1", fontWeight:400, fontSize:58}}>Automate</span> the rest.
          </h1>
          <p style={{color:"var(--text-dim)", fontSize:16, marginTop:18, maxWidth:480, lineHeight:1.55}}>
            A visual node engine that turns messy folders of media into perfectly-processed deliverables. Runs entirely on your machine.
          </p>
          <div style={{display:"flex", gap:10, marginTop:26, flexWrap:"wrap"}}>
            <button style={{background:"var(--primary)", color:"white", padding:"12px 18px", borderRadius:10, fontSize:14, fontWeight:600, display:"inline-flex", alignItems:"center", gap:8, boxShadow:"0 8px 24px rgba(59,130,246,0.35), 0 0 0 1px rgba(255,255,255,0.1) inset"}}>
              {I.plus} Create New Recipe
            </button>
            <button style={{background:"rgba(255,255,255,0.06)", border:"1px solid var(--line-2)", padding:"12px 18px", borderRadius:10, fontSize:14, fontWeight:500, display:"inline-flex", alignItems:"center", gap:8}}>
              {I.library} Browse 83 Recipes
            </button>
            <button style={{padding:"12px 14px", color:"var(--text-dim)", fontSize:13, display:"inline-flex", alignItems:"center", gap:8}} className="mono">
              {I.command} K <span style={{opacity:.7}}>— open launcher</span>
            </button>
          </div>
          {/* stats bar */}
          <div style={{marginTop:32, display:"flex", gap:24, paddingTop:22, borderTop:"1px solid var(--line)"}}>
            {[
              {k:"83", v:"recipes ready"},
              {k:"7", v:"node categories"},
              {k:"100%", v:"on-device"},
            ].map(s=>(
              <div key={s.v}>
                <div style={{fontSize:22, fontWeight:700}} className="mono">{s.k}</div>
                <div style={{fontSize:11, color:"var(--text-mute)", textTransform:"uppercase", letterSpacing:1}}>{s.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT: live pipeline */}
        <div style={{position:"relative"}}>
          <div style={{
            position:"relative",
            background:"rgba(8,13,25,0.7)",
            border:"1px solid var(--line-2)",
            borderRadius:16, padding:20, minHeight:340,
            boxShadow:"0 30px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02) inset"
          }}>
            {/* window chrome */}
            <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:16}}>
              <div style={{width:9, height:9, borderRadius:"50%", background:"#ff5f56"}}/>

function GuidedTourHero(){
  const steps = [

  const [step, setStep] = React.useState(0);
  React.useEffect(()=>{
    const id = setInterval(()=>setStep(s=>(s+1)%steps.length), 2800);

  },[]);

  const ContentPane = () => {
    if(step===0) return <DropPreview/>;
    if(step===1) return <RecipePreview/>;

    if(step===3) return <BeforeAfterPreview/>;
    return <RunPreview/>;

  return (
    <div style={{
      position:"relative", borderRadius:20, overflow:"hidden",
      background:"linear-gradient(180deg, #0f1a30 0%, #0c1424 100%)",
      border:"1px solid var(--line-2)",

      <div className="gridbg" style={{position:"absolute", inset:0, opacity:.5, maskImage:"radial-gradient(ellipse at center, black 30%, transparent 80%)"}}/>

      <div style={{position:"relative"}}>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:48, alignItems:"end", marginBottom:30}}>
          <div>
            <div style={{display:"inline-flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:999, background:"rgba(52,211,153,0.1)", border:"1px solid rgba(52,211,153,0.3)", marginBottom:20}}>
              <span className="pulse-dot" style={{width:6, height:6, borderRadius:3, background:"var(--green)"}}/>
              <span className="mono" style={{fontSize:11, color:"#6ee7b7", letterSpacing:1, textTransform:"uppercase"}}>Five-step first run</span>
            </div>
            <h1 style={{margin:0, fontSize:52, lineHeight:1.05, letterSpacing:-1, fontWeight:700}}>
              From <span className="serif" style={{fontStyle:"italic", color:"#cbd5e1", fontWeight:400}}>zero</span> to a finished<br/>batch in under a minute.
            </h1>
          </div>
          <div>
            <p style={{color:"var(--text-dim)", fontSize:15, margin:0, lineHeight:1.6, maxWidth:440}}>
              Follow the rail below or skip straight to a recipe. Everything runs locally — your files never leave this machine.
            </p>
            <div style={{display:"flex", gap:10, marginTop:18}}>
              <button style={{background:"var(--primary)", color:"white", padding:"11px 16px", borderRadius:10, fontSize:14, fontWeight:600, display:"inline-flex", alignItems:"center", gap:8}}>{I.play} Start the tour</button>
              <button style={{background:"rgba(255,255,255,0.06)", border:"1px solid var(--line-2)", padding:"11px 16px", borderRadius:10, fontSize:14, fontWeight:500, display:"inline-flex", alignItems:"center", gap:8}}>{I.x} Skip</button>
            </div>
          </div>
        </div>

        {/* step rail */}
        <div style={{display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:14, marginBottom:22}}>
          {steps.map((s,i)=>{
            const done = i<step, cur = i===step;
            return (
              <button key={s.n} onClick={()=>setStep(i)} style={{
                textAlign:"left", padding:"14px 16px", borderRadius:12,
                background: cur? "rgba(20,28,46,1)": "rgba(20,28,46,0.5)",
                border: cur? `1px solid ${s.color}` : "1px solid var(--line-2)",

                  <div style={{

                    {done? I.check : s.n}

                <div>
                  <div style={{fontSize:14, fontWeight:600}}>{s.label}</div>
                  <div style={{fontSize:12, color:"var(--text-mute)", marginTop:2}}>{s.sub}</div>

                {cur && <div style={{position:"absolute", left:0, bottom:0, height:2, width:"100%", background:"rgba(255,255,255,0.04)"}}>

        </div>
      </div>
    </div>
  );

/* ===================== SMART AUTOMATION / JUST ASK CLAUDE ===================== */
function SmartAutomation(){
  const prompts = [
    "deblur photos older than 2020 and re-save as webp",
    "build a contact sheet per folder with watermark",
    "extract faces, group, and rename by person",
  ];
  const [ph, setPh] = React.useState(0);
  const [text, setText] = React.useState("");
  React.useEffect(()=>{
    let i=0;
    const target = prompts[ph];
    setText("");
    const id = setInterval(()=>{
      i++;
      setText(target.slice(0,i));
      if(i>=target.length){
        clearInterval(id);
        setTimeout(()=>setPh(p=>(p+1)%prompts.length), 1800);
      }
    }, 28);
    return ()=>clearInterval(id);
  },[ph]);
  return (
    <div style={{
      borderRadius:16, padding:32,
      background:"linear-gradient(135deg, rgba(59,130,246,0.14), rgba(167,139,250,0.08))",
      border:"1px solid rgba(59,130,246,0.3)",
      position:"relative", overflow:"hidden"
    }}>
      <div style={{position:"absolute", top:-60, right:-60, width:260, height:260, background:"radial-gradient(circle, rgba(167,139,250,0.25), transparent 60%)", pointerEvents:"none"}}/>
      <div style={{display:"grid", gridTemplateColumns:"1.3fr 1fr", gap:28, alignItems:"center", position:"relative"}}>
        <div>
          <div style={{display:"inline-flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:999, background:"rgba(167,139,250,0.15)", border:"1px solid rgba(167,139,250,0.35)", marginBottom:14, whiteSpace:"nowrap", width:"fit-content"}}>
            {I.sparkle}
            <span className="mono" style={{fontSize:11, color:"#c4b5fd", letterSpacing:1, textTransform:"uppercase"}}>Just Ask Claude</span>
          </div>
          <h3 style={{margin:"0 0 10px", fontSize:26, fontWeight:700, letterSpacing:-.4}}>Smart automation, made simple.</h3>
          <p style={{margin:0, color:"var(--text-dim)", fontSize:14, lineHeight:1.6, maxWidth:480}}>
            Describe what you want in plain English. Claude builds the recipe — every node, every parameter — and you just hit Run. No technical skills required.
          </p>
        </div>
        <div style={{background:"rgba(8,13,25,0.85)", border:"1px solid var(--line-2)", borderRadius:12, padding:16}}>
          <div className="mono" style={{fontSize:10, color:"var(--text-mute)", textTransform:"uppercase", letterSpacing:1.4, marginBottom:10}}>Prompt</div>
          <div className="mono" style={{fontSize:14, lineHeight:1.5, minHeight:56, color:"var(--text)"}}>
            {text}<span className="caret" style={{color:"var(--primary-2)"}}>▎</span>
          </div>
          <div style={{marginTop:14, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div style={{display:"flex", gap:6}}>
              {prompts.map((_,i)=>(
                <div key={i} style={{width:24, height:3, borderRadius:2, background: i===ph? "var(--primary-2)": "rgba(255,255,255,0.1)"}}/>
              ))}
            </div>
            <button style={{padding:"7px 12px", borderRadius:8, background:"var(--primary)", color:"white", fontSize:12, fontWeight:600, display:"inline-flex", alignItems:"center", gap:6}}>
              {I.wand} Generate
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===================== TWEAKS PANEL ===================== */
function TweaksPanel({tweaks, setTweaks, visible}){
  if(!visible) return null;
  const set = (patch)=>{
    const next = {...tweaks, ...patch};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:patch}, '*');
  };
  return (
    <div className="tweaks">
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
        {I.settings}
        <div style={{fontWeight:600, fontSize:13}}>Tweaks</div>
      </div>
      <div className="mono" style={{fontSize:10, color:"var(--text-mute)", textTransform:"uppercase", letterSpacing:1.4, marginBottom:8}}>Hero variant</div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:6}}>
        {[
          {k:"pipeline", label:"A · Live Pipeline"},
          {k:"tour", label:"B · Guided Tour"},
        ].map(o=>(
          <button key={o.k} onClick={()=>set({heroVariant:o.k})} style={{
            padding:"10px 12px", borderRadius:8, fontSize:12, fontWeight:500,
            background: tweaks.heroVariant===o.k? "rgba(59,130,246,0.15)": "rgba(255,255,255,0.03)",
            border: tweaks.heroVariant===o.k? "1px solid rgba(59,130,246,0.5)" : "1px solid var(--line-2)",
            color: tweaks.heroVariant===o.k? "#93c5fd" : "var(--text-dim)", textAlign:"left"
          }}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

/* ===================== APP ===================== */
function App(){
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(()=>{
    const handler = (e)=>{
      if(!e.data) return;
      if(e.data.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  return (
    <div style={{display:"flex", minHeight:"100vh", background:"var(--bg)"}}>
      <Sidebar active="started"/>
      <main style={{flex:1, minWidth:0}}>
        <PageHeader
          title="Get Started"
          icon={I.rocket}
          right={
            <div style={{display:"flex", gap:10, alignItems:"center"}}>
              <div className="mono" style={{fontSize:11, color:"var(--text-mute)", padding:"5px 10px", borderRadius:6, background:"rgba(255,255,255,0.03)", border:"1px solid var(--line)"}}>
                <span style={{color:"var(--green)"}}>●</span> engine ready · 8 models loaded
              </div>
              <button style={{padding:"7px 12px", fontSize:12, color:"var(--text-dim)", border:"1px solid var(--line-2)", borderRadius:8, display:"inline-flex", alignItems:"center", gap:6}}>{I.help} Tour</button>
            </div>
          }
        />

        <div style={{padding:"28px 32px 48px", display:"flex", flexDirection:"column", gap:32, maxWidth:1200, margin:"0 auto"}}>
          {tweaks.heroVariant==="tour" ? <GuidedTourHero/> : <LivePipelineHero/>}

          <PipelineDiagram/>

          <Personas/>

          <SmartAutomation/>

          <Shortcuts/>
        </div>
      </main>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOpen}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
