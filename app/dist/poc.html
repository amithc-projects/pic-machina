<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicMachina Export POC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 { margin-top: 0; color: #38bdf8; font-size: 24px; }
        .btn-group { display: flex; gap: 12px; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-pdf { background: #ef4444; color: white; }
        .btn-pdf:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-ppt { background: #f97316; color: white; }
        .btn-ppt:hover { background: #ea580c; transform: translateY(-2px); }
        .log {
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>PicMachina Export Proof-of-Concept</h1>
        <p>Testing purely client-side multi-page generation.</p>
        
        <div class="btn-group">
            <button class="btn-pdf" onclick="generatePDF()">
                <span>📄</span> Generate 3-Page PDF
            </button>
            <button class="btn-ppt" onclick="generatePPT()">
                <span>📊</span> Generate 3-Slide PPTX
            </button>
        </div>

        <div id="log" class="log">Ready.</div>
    </div>

    <script>
        const log = (msg) => {
            document.getElementById('log').innerText = msg;
            console.log(msg);
        };

        async function generatePDF() {
            log("Generating PDF...");
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Page 1
                doc.setFontSize(22);
                doc.text("PicMachina PDF POC", 20, 30);
                doc.setFontSize(12);
                doc.text("This is page 1 of a client-side generated PDF.", 20, 50);
                doc.rect(20, 60, 160, 10, 'F'); // A blue-ish bar

                // Page 2
                doc.addPage();
                doc.text("Welcome to Page 2", 20, 30);
                doc.setDrawColor(255, 0, 0);
                doc.line(20, 40, 180, 40);
                doc.text("This demonstrates adding a new page automatically.", 20, 50);

                // Page 3
                doc.addPage();
                doc.text("Final Page 3", 20, 30);
                doc.text("Check your downloads folder for 'PicMachina_Test.pdf'.", 20, 50);

                doc.save("PicMachina_Test.pdf");
                log("PDF Downloaded!");
            } catch (err) {
                log("Error: " + err.message);
            }
        }

        async function generatePPT() {
            log("Generating PPTX...");
            try {
                const pptx = new PptxGenJS();

                // Slide 1
                let slide1 = pptx.addSlide();
                slide1.addText("PicMachina PPTX POC", { x: 1, y: 1, w: '80%', fontSize: 36, color: '38bdf8', bold: true });
                slide1.addText("Client-side PowerPoint generation test.", { x: 1, y: 2, fontSize: 18 });

                // Slide 2
                let slide2 = pptx.addSlide();
                slide2.addText("Slide 2: Layout Test", { x: 1, y: 0.5, fontSize: 24, color: 'f97316' });
                slide2.addShape(pptx.ShapeType.rect, { x: 1, y: 1.5, w: 3, h: 3, fill: { color: '334155' } });
                slide2.addText("This rectangle was drawn purely in JavaScript.", { x: 4.5, y: 2.5, w: 4, fontSize: 14 });

                // Slide 3
                let slide3 = pptx.addSlide();
                slide3.addText("Success!", { x: '40%', y: '40%', fontSize: 48, align: 'center' });

                await pptx.writeFile({ fileName: "PicMachina_Test.pptx" });
                log("PPTX Downloaded!");
            } catch (err) {
                log("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
