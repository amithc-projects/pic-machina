<!DOCTYPE html>
<html lang="en" data-mode="dark" data-theme="pro-studio">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PicMachina — Pro Studio Batch Image Processor</title>
  <meta name="description" content="Local-first, high-performance batch media processing with a visual node engine. Professional automation for creative workflows." />

  <!-- Favicons -->
  <link rel="icon" href="/branding/brand-pack/favicons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/branding/brand-pack/favicons/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/branding/brand-pack/favicons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/branding/brand-pack/favicons/favicon-48.png" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/branding/brand-pack/app-icons/apple-touch-icon.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0B1020" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PicMachina" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://picmachina.netlify.app/" />
  <meta property="og:title" content="PicMachina — Pro Studio Batch Image Processor" />
  <meta property="og:description" content="Local-first, high-performance batch media processing with a visual node engine." />
  <meta property="og:image" content="https://picmachina.netlify.app/branding/brand-pack/social/open-graph-1200x630.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://picmachina.netlify.app/" />
  <meta property="twitter:title" content="PicMachina — Pro Studio Batch Image Processor" />
  <meta property="twitter:description" content="Local-first, high-performance batch media processing with a visual node engine." />
  <meta property="twitter:image" content="https://picmachina.netlify.app/branding/brand-pack/social/twitter-card-1200x600.png" />

  <!-- Aurora Design System -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/amithc-projects/aurora-docs@main/static/css/aurora.css" />

  <!-- Material Symbols (used across all screens) -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Monospace font for logs / technical labels -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" />

  <!-- Pro Studio Theme (overrides Aurora tokens) -->
  <link rel="stylesheet" href="/src/theme.css" />

  <!-- App-level layout & utilities -->
  <link rel="stylesheet" href="/src/app.css" />
</head>

<body>

  <!-- App Shell -->
  <div id="app-shell" class="app-shell">

    <!-- Left Navigation Rail -->
    <nav id="app-nav" class="app-nav" aria-label="Main navigation">
      <div class="app-nav__brand">
        <div class="app-nav__logo" aria-label="PicMachina">
          <img src="/branding/logo.svg" alt="" style="width:24px;height:24px;display:block" />
        </div>
        <span class="app-nav__wordmark">PicMachina</span>
      </div>

      <ul class="app-nav__items" role="list">
        <li>
          <a href="#lib" class="app-nav__item" data-screen="lib" title="Recipe Library">
            <span class="material-symbols-outlined">library_books</span>
            <span class="app-nav__label">Library</span>
          </a>
        </li>
        <li>
          <a href="#bkb" class="app-nav__item" data-screen="bkb" title="Block Builder">
            <span class="material-symbols-outlined">widgets</span>
            <span class="app-nav__label">Block Builder</span>
          </a>
        </li>
        <li>
          <a href="#tpl" class="app-nav__item" data-screen="tpl" title="Template Editor">
            <span class="material-symbols-outlined">wallpaper</span>
            <span class="app-nav__label">Templates</span>
          </a>
        </li>
        <li class="app-nav__divider"></li>
        <li>
          <a href="#out" class="app-nav__item" data-screen="out" title="Output History">
            <span class="material-symbols-outlined">history</span>
            <span class="app-nav__label">History</span>
          </a>
        </li>
        <li>
          <a href="#fld" class="app-nav__item" data-screen="fld" title="Folder Viewer">
            <span class="material-symbols-outlined">folder_open</span>
            <span class="app-nav__label">Folder</span>
          </a>
        </li>

        <li class="app-nav__divider"></li>
        <li>
          <a href="#" class="app-nav__item" id="nav-db-backup" title="Backup/Restore Database">
            <span class="material-symbols-outlined">settings_backup_restore</span>
            <span class="app-nav__label">Config Sync</span>
          </a>
        </li>
        <li>
          <a href="#" class="app-nav__item" id="nav-help" title="Tutorial & Documentation">
            <span class="material-symbols-outlined">help</span>
            <span class="app-nav__label">Help</span>
          </a>
        </li>
        <li>
          <a href="#" class="app-nav__item" id="nav-settings" title="Global Preferences">
            <span class="material-symbols-outlined">settings</span>
            <span class="app-nav__label">Settings</span>
          </a>
        </li>
      </ul>

      <div class="app-nav__footer">
        <button class="app-nav__item app-nav__item--icon-only" id="btn-theme-toggle" title="Toggle theme"
          aria-label="Toggle theme">
          <span class="material-symbols-outlined">contrast</span>
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-main" class="app-main" role="main">
      <!-- Screen content is injected here by the router -->
      <div id="screen-container" class="screen-container">
        <div class="screen-loading">
          <div class="spinner spinner--lg"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- Toast portal is created dynamically by Aurora toast.js -->

  <!-- Entry point -->
  <script type="module" src="/src/main.js"></script>

  <!-- PWA Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('[PWA] Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>

</html>
